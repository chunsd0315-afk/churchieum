<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4CAF50"/>
      <stop offset="100%" stop-color="#1E88E5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>

  <!-- Cross -->
  <line x1="32" y1="4"   x2="32" y2="17" stroke="white" stroke-width="4"   stroke-linecap="round"/>
  <line x1="25" y1="10"  x2="39" y2="10" stroke="white" stroke-width="4"   stroke-linecap="round"/>

  <!-- Arch -->
  <path d="M10 57 L10 33 Q10 17 32 17 Q54 17 54 33 L54 57"
        stroke="white" stroke-width="3.6" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Connection arc -->
  <path d="M20 31 Q32 22 44 31"
        stroke="white" stroke-width="2.8" fill="none"
        stroke-linecap="round" opacity="0.80"/>

  <!-- Left person head -->
  <circle cx="20" cy="37.5" r="5" fill="white" opacity="0.92"/>
  <!-- Left person body -->
  <path d="M15 57 L15 46 Q15 42.5 20 42.5 Q25 42.5 25 46 L25 57"
        fill="white" opacity="0.80"/>

  <!-- Right person head -->
  <circle cx="44" cy="37.5" r="5" fill="white" opacity="0.92"/>
  <!-- Right person body -->
  <path d="M39 57 L39 46 Q39 42.5 44 42.5 Q49 42.5 49 46 L49 57"
        fill="white" opacity="0.80"/>
</svg>
